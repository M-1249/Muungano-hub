<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Union Hub Tanzania</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">UNION<span>HUB</span> TZ</a>
  <button class="nav-toggle" onclick="toggleNav()">&#9776;</button>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="history.html">Historia</a>
    <a href="benefits.html">Faida</a>
    <a href="makala.html">Makala</a>
    <a href="video.html">Video</a>
    <a href="picha.html">Picha</a>
    <a href="quiz.html">Quiz</a>
    <a href="profile.html">Profile</a>
    <a href="#" class="nav-cta" onclick="logout()">Logout</a>
    <button class="lang-btn" id="langToggleBtn" onclick="toggleLang()">EN</button>
  </div>
</nav>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer-panel" id="drawerPanel">
  <div class="drawer-close">
    <a href="index.html" style="color:#fff;text-decoration:none;font-size:1rem">← Rudi Nyumbani</a>
    <button onclick="window.location.href='index.html'" style="background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer;float:right">&times;</button>
  </div>

  <section class="section" style="padding-top:20px">
    <div class="dash-header">
      <h1 id="welcomeMsg">Inapakia...</h1>
    </div>

    <div id="adminBtnArea"></div>

    <div class="stat-grid" style="margin-top:16px">
      <div class="stat-card">
        <div class="num" id="quizCount">0</div>
        <div class="label">Quiz Zilizofanyika</div>
      </div>
      <div class="stat-card">
        <div class="num" id="bestScore">0/10</div>
        <div class="label">Alama Bora</div>
      </div>
      <div class="stat-card">
        <div class="num" id="lastDate">-</div>
        <div class="label">Mara ya Mwisho</div>
      </div>
    </div>

    <span class="section-eyebrow" style="margin-top:20px;display:block">Kituo cha Upakuaji</span>
    <h2 class="section-title">Download Centre</h2>
    <div class="download-list" id="downloadCentreList" style="margin-bottom:24px">
      <p style="color:#888">Inapakia...</p>
    </div>

    <span class="section-eyebrow">Zaidi</span>
    <h2 class="section-title">Vipengele Vingine</h2>
    <div class="download-list" id="extraItemsList" style="margin-bottom:24px">
      <p style="color:#888">Inapakia...</p>
    </div>
  </section>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script src="js/chatbot.js"></script>
<script>
requireLogin(function(user) {
  document.getElementById('welcomeMsg').textContent = 'Karibu, ' + (user.name || '');

  const scores = user.scores || [];
  document.getElementById('quizCount').textContent = scores.length;
  if (scores.length) {
    const best = Math.max(...scores.map(s => s.score));
    document.getElementById('bestScore').textContent = best + '/10';
    document.getElementById('lastDate').textContent = scores[scores.length - 1].date;
  }

  if (user.role === 'admin') {
    document.getElementById('adminBtnArea').innerHTML =
      '<a href="admin.html" class="btn btn-primary" style="margin-top:10px;display:inline-block">🔐 Fungua Admin Panel</a>';
  }

  loadDownloadCentre();
  loadExtraDashboardItems();
});

async function loadDownloadCentre() {
  const list = document.getElementById('downloadCentreList');
  try {
    const snap = await db.collection('downloads').get();
    if (snap.empty) {
      list.innerHTML = '<p style="color:#888">Hakuna nyaraka zilizopakiwa bado.</p>';
      return;
    }
    const docs = snap.docs.map(d => d.data()).sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    list.innerHTML = '';
    docs.forEach(d => {
      const item = document.createElement('div');
      item.className = 'download-item';
      item.innerHTML = `<span>${d.icon || '📄'} ${d.title}</span><a href="${d.url}" target="_blank" class="dl-btn">Pakua</a>`;
      list.appendChild(item);
    });
  } catch (err) {
    list.innerHTML = '<p style="color:#888">Hakuna nyaraka zilizopakiwa bado.</p>';
  }
}

async function loadExtraDashboardItems() {
  const list = document.getElementById('extraItemsList');
  try {
    const snap = await db.collection('dashboardItems').get();
    if (snap.empty) {
      list.innerHTML = '<p style="color:#888;font-size:0.85rem">Hakuna vipengele vya ziada bado.</p>';
      return;
    }
    const docs = snap.docs.map(d => d.data()).sort((a,b) => (a.order||0)-(b.order||0));
    list.innerHTML = '';
    docs.forEach(d => {
      const item = document.createElement('a');
      item.href = d.url;
      item.className = 'download-item';
      item.style.cssText = 'text-decoration:none;color:inherit';
      item.innerHTML = `<span>${d.icon || '🔗'} ${d.label}</span><span class="dl-btn">Fungua</span>`;
      list.appendChild(item);
    });
  } catch (err) {
    list.innerHTML = '<p style="color:#888;font-size:0.85rem">Hakuna vipengele vya ziada bado.</p>';
  }
}
</script>
</body>
</html>
