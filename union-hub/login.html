<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Union Hub Tanzania</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">UNION<span>HUB</span> TZ</a>
  <button class="nav-toggle" onclick="toggleNav()">&#9776;</button>
  <div class="nav-links" id="navLinks">
    <a href="index.html" data-i18n="nav_home">Home</a>
    <a href="history.html" data-i18n="nav_history">Historia</a>
    <a href="benefits.html" data-i18n="nav_benefits">Faida</a>
    <a href="makala.html">Makala</a>
    <a href="quiz.html" data-i18n="nav_quiz">Quiz</a>
    <a href="dashboard.html" data-i18n="nav_downloads">Downloads</a>
    <a href="login.html" class="nav-cta" data-i18n="nav_login">Login</a>
    <button class="lang-btn" id="langToggleBtn" onclick="toggleLang()">EN</button>
  </div>
</nav>

<section class="section" style="padding-top:60px">
  <div class="form-box">
    <h2 data-i18n="login_title">Karibu Tena</h2>
    <p class="sub" data-i18n="login_sub">Ingia kwenye akaunti yako kuendelea na masomo.</p>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="field">
        <label data-i18n="field_email">Barua Pepe</label>
        <input type="email" id="email" required placeholder="wewe@mfano.com">
      </div>
      <div class="field">
        <label data-i18n="field_password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
        <div class="form-error" id="loginError"></div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" data-i18n="btn_signin">Ingia</button>
    </form>

    <p class="form-foot"><span data-i18n="no_account">Hauna akaunti?</span> <a href="register.html">Jisajili hapa</a></p>
  </div>
</section>

<footer>
  <div class="footer-bottom">
    &copy; 2026 Union Hub Tanzania. Haki zote zimehifadhiwa.<br>
    <span style="font-size:0.75rem;color:#777">Tovuti hii imetengenezwa na <strong>Mkungu Alias</strong> | mkungujames@gmail.com | Dodoma, Tanzania</span>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script src="js/chatbot.js"></script>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('loginError');
  errorBox.style.display = 'none';
  const result = await loginUser(email, password);
  if (result.ok) {
    showToast('Umeingia kikamilifu!');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } else {
    errorBox.textContent = result.message;
    errorBox.style.display = 'block';
  }
  return false;
}
</script>
</body>
</html>
