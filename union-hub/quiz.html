<script>
/* Anza quiz MARA MOJA bila kusubiri auth */
loadQuiz();
recordPageView('quiz');

/* Auth inafanyika kwa background — kwa kuhifadhi alama tu */
auth.onAuthStateChanged(async (user) => {
  if (user) {
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      uh_currentUserData = { uid: user.uid, ...doc.data() };
    } catch (err) { /* ignore */ }
  }
});
</script>
